<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0f">
  <title>ward_sentry</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      overflow: hidden;
      width: 100dvw;
      height: 100dvh;
      font-family: 'Courier New', monospace;
      touch-action: none;
      user-select: none;
    }

    /* Animated background grid */
    .grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,200,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,200,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
    }
    @keyframes gridMove {
      from { background-position: 0 0; }
      to   { background-position: 48px 48px; }
    }

    /* Scanline overlay */
    .scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.07) 2px,
        rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    canvas {
      position: fixed;
      inset: 0;
      display: block;
    }

    /* iOS gyro permission overlay */
    #permOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      gap: 20px;
      backdrop-filter: blur(8px);
    }
    #permOverlay.hidden { display: none; }
    #permOverlay p {
      color: #00ffc8;
      font-size: 16px;
      text-align: center;
      padding: 0 32px;
      line-height: 1.6;
      text-shadow: 0 0 12px #00ffc8;
    }
    #permOverlay p span { color: #fff; }
    #permBtn {
      padding: 14px 40px;
      background: transparent;
      border: 2px solid #00ffc8;
      color: #00ffc8;
      font-family: inherit;
      font-size: 16px;
      letter-spacing: 2px;
      cursor: pointer;
      border-radius: 8px;
      text-shadow: 0 0 8px #00ffc8;
      box-shadow: 0 0 20px #00ffc880, inset 0 0 20px #00ffc810;
      transition: all 0.2s;
    }
    #permBtn:hover { background: #00ffc820; box-shadow: 0 0 40px #00ffc8; }
  </style>
</head>
<body>
  <div class="grid"></div>
  <div class="scanlines"></div>
  <canvas id="c"></canvas>

  <!-- iOS 13+ requires explicit permission for DeviceOrientation -->
  <div id="permOverlay" class="hidden">
    <p>Разреши доступ к <span>гироскопу</span>, чтобы управлять мячиком наклоном телефона</p>
    <button id="permBtn">РАЗРЕШИТЬ</button>
  </div>

  <script>
  (() => {
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    // ─── RESIZE ───────────────────────────────────────────────────────────────
    let W, H;
    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
      layoutButtons();
    }

    // ─── SOCIALS ──────────────────────────────────────────────────────────────
    const SOCIALS = [
      { label: 'VK',        handle: '@ward_sentry', url: 'https://vk.com/ward_sentry',           color: '#5181b8', glow: '#5181b880' },
      { label: 'Telegram',  handle: '@ward_sentry', url: 'https://t.me/ward_sentry',              color: '#29a8eb', glow: '#29a8eb80' },
      { label: 'Instagram', handle: '@ward_sentry', url: 'https://instagram.com/ward_sentry',     color: '#e1306c', glow: '#e1306c80' },
      { label: 'YouTube',   handle: '@ward_sentry', url: 'https://youtube.com/@ward_sentry',      color: '#ff3e3e', glow: '#ff3e3e80' },
    ];

    // ─── BUTTONS ──────────────────────────────────────────────────────────────
    const BTNS = [];
    const BTN_R = 12; // corner radius

    function layoutButtons() {
      BTNS.length = 0;
      const pad   = Math.min(24, W * 0.05);
      const gap   = Math.min(18, W * 0.04);
      const bw    = (W - pad * 2 - gap) / 2;
      const bh    = Math.max(64, Math.min(88, H * 0.11));
      const cols  = 2;
      const rows  = 2;
      const totalH = rows * bh + (rows - 1) * gap;
      const startY = H * 0.42 - totalH / 2;  // center slightly above middle (title above)

      SOCIALS.forEach((s, i) => {
        const col = i % cols;
        const row = Math.floor(i / cols);
        BTNS.push({
          x: pad + col * (bw + gap),
          y: startY + row * (bh + gap),
          w: bw,
          h: bh,
          social: s,
          glow:       0,   // 0-1 smooth glow intensity
          press:      0,   // 0-1 press animation
          cooldown:   0,   // frames before re-trigger
        });
      });
    }

    // ─── BALL ─────────────────────────────────────────────────────────────────
    const BALL_R  = 22;
    const FRICTION = 0.985;
    const BOUNCE   = 0.55;
    const GRAVITY_BASE = 0.38;

    const ball = { x: 0, y: 0, vx: 0, vy: 0 };
    const trail = [];

    function resetBall() {
      ball.x  = W / 2;
      ball.y  = H * 0.18;
      ball.vx = (Math.random() - 0.5) * 3;
      ball.vy = 0;
      trail.length = 0;
    }

    // ─── GRAVITY SOURCE ───────────────────────────────────────────────────────
    let gravX = 0, gravY = GRAVITY_BASE;  // overridden by gyro

    // Mouse / touch fallback (desktop: gravity toward cursor)
    let mouseX = null, mouseY = null;
    const MOUSE_PULL = 0.18;

    window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
    window.addEventListener('mouseleave', () => { mouseX = mouseY = null; });

    // ─── GYROSCOPE ────────────────────────────────────────────────────────────
    let hasGyro = false;

    function onOrientation(e) {
      if (e.gamma == null) return;
      hasGyro = true;
      // gamma: -90..90 (left-right tilt), beta: -180..180 (front-back tilt)
      gravX = Math.max(-1, Math.min(1, e.gamma / 45)) * GRAVITY_BASE * 2.5;
      gravY = Math.max(-1, Math.min(1, e.beta  / 45)) * GRAVITY_BASE * 2.5;
    }

    function setupGyro() {
      if (typeof DeviceOrientationEvent === 'undefined') return;
      if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        // iOS 13+ – need user gesture
        const overlay = document.getElementById('permOverlay');
        overlay.classList.remove('hidden');
        document.getElementById('permBtn').addEventListener('click', () => {
          DeviceOrientationEvent.requestPermission().then(state => {
            if (state === 'granted') window.addEventListener('deviceorientation', onOrientation);
            overlay.classList.add('hidden');
          }).catch(() => overlay.classList.add('hidden'));
        });
      } else {
        window.addEventListener('deviceorientation', onOrientation);
      }
    }

    // ─── PARTICLES ────────────────────────────────────────────────────────────
    const particles = [];

    function burst(x, y, color, n = 22) {
      for (let i = 0; i < n; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 2 + Math.random() * 6;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 2,
          life: 1,
          decay: 0.02 + Math.random() * 0.025,
          r: 2 + Math.random() * 3,
          color,
        });
      }
    }

    // ─── DESKTOP CLICK ────────────────────────────────────────────────────────
    canvas.addEventListener('click', e => {
      const mx = e.clientX, my = e.clientY;
      BTNS.forEach(btn => {
        if (mx >= btn.x && mx <= btn.x + btn.w && my >= btn.y && my <= btn.y + btn.h) {
          triggerButton(btn);
        }
      });
    });

    function triggerButton(btn) {
      if (btn.cooldown > 0) return;
      btn.press    = 1;
      btn.cooldown = 90;
      // bounce ball away
      ball.vy = -13;
      ball.vx += (Math.random() - 0.5) * 8;
      burst(btn.x + btn.w / 2, btn.y + btn.h / 2, btn.social.color);
      setTimeout(() => window.open(btn.social.url, '_blank'), 350);
    }

    // ─── COLLISION: ball ↔ button ─────────────────────────────────────────────
    function collideBallButton(btn) {
      // closest point on rect to ball center
      const cx = Math.max(btn.x, Math.min(ball.x, btn.x + btn.w));
      const cy = Math.max(btn.y, Math.min(ball.y, btn.y + btn.h));
      const dx = ball.x - cx;
      const dy = ball.y - cy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist >= BALL_R) return false;

      // push ball out
      const nx = dist === 0 ? 0 : dx / dist;
      const ny = dist === 0 ? -1 : dy / dist;
      ball.x = cx + nx * BALL_R;
      ball.y = cy + ny * BALL_R;

      // reflect velocity
      const dot = ball.vx * nx + ball.vy * ny;
      ball.vx = (ball.vx - 2 * dot * nx) * BOUNCE;
      ball.vy = (ball.vy - 2 * dot * ny) * BOUNCE;

      btn.glow = Math.min(1, btn.glow + 0.4);

      const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
      if (speed > 2.5) triggerButton(btn);

      return true;
    }

    // ─── UPDATE ───────────────────────────────────────────────────────────────
    function update() {
      // Compute gravity
      let ax = gravX;
      let ay = gravY;

      // Desktop: add mouse pull when no gyro
      if (!hasGyro && mouseX !== null) {
        const dx = mouseX - ball.x;
        const dy = mouseY - ball.y;
        const d  = Math.sqrt(dx * dx + dy * dy) || 1;
        ax += (dx / d) * MOUSE_PULL * Math.min(d / 200, 1);
        ay += (dy / d) * MOUSE_PULL * Math.min(d / 200, 1);
      }

      ball.vx = (ball.vx + ax) * FRICTION;
      ball.vy = (ball.vy + ay) * FRICTION;
      ball.x += ball.vx;
      ball.y += ball.vy;

      // Wall bounce
      if (ball.x - BALL_R < 0)  { ball.x = BALL_R;     ball.vx *= -BOUNCE; }
      if (ball.x + BALL_R > W)  { ball.x = W - BALL_R; ball.vx *= -BOUNCE; }
      if (ball.y - BALL_R < 0)  { ball.y = BALL_R;     ball.vy *= -BOUNCE; }
      if (ball.y + BALL_R > H)  { ball.y = H - BALL_R; ball.vy *= -BOUNCE; }

      // Button collisions
      BTNS.forEach(collideBallButton);

      // Trail
      trail.unshift({ x: ball.x, y: ball.y });
      if (trail.length > 18) trail.pop();

      // Decay button states
      BTNS.forEach(btn => {
        btn.glow     = Math.max(0, btn.glow - 0.04);
        btn.press    = Math.max(0, btn.press - 0.04);
        if (btn.cooldown > 0) btn.cooldown--;
      });

      // Particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x  += p.vx;
        p.y  += p.vy;
        p.vy += 0.18;
        p.vx *= 0.97;
        p.life -= p.decay;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    // ─── DRAW ─────────────────────────────────────────────────────────────────
    function drawRoundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.arcTo(x + w, y,     x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x,     y + h, r);
      ctx.arcTo(x,     y + h, x,     y,     r);
      ctx.arcTo(x,     y,     x + w, y,     r);
      ctx.closePath();
    }

    function drawButtons() {
      BTNS.forEach(btn => {
        const { x, y, w, h, social, glow, press } = btn;
        const yOff = press * 4; // press-down shift

        ctx.save();
        ctx.translate(0, yOff);

        // Shadow/glow
        ctx.shadowColor = social.color;
        ctx.shadowBlur  = 8 + glow * 28 + press * 20;

        // Background
        drawRoundRect(x, y, w, h, BTN_R);
        ctx.fillStyle = `rgba(10,10,20,0.88)`;
        ctx.fill();

        // Border
        ctx.strokeStyle = social.color;
        ctx.lineWidth   = 1.5 + glow * 1.5;
        ctx.stroke();

        // Pressed fill
        if (press > 0) {
          drawRoundRect(x, y, w, h, BTN_R);
          ctx.fillStyle = social.color + Math.floor(press * 60).toString(16).padStart(2, '0');
          ctx.fill();
        }

        ctx.shadowBlur = 0;

        // Corner brackets decoration
        const bLen = 12, bW = 1.5;
        ctx.strokeStyle = social.color;
        ctx.lineWidth   = bW;
        ctx.globalAlpha = 0.5 + glow * 0.5;
        [
          [x + 6,     y + 6,      bLen, 0,    0,    bLen],  // top-left
          [x + w - 6, y + 6,      -bLen, 0,   0,    bLen],  // top-right
          [x + 6,     y + h - 6,  bLen, 0,    0,    -bLen], // bot-left
          [x + w - 6, y + h - 6,  -bLen, 0,   0,    -bLen], // bot-right
        ].forEach(([sx, sy, ex1, ey1, ex2, ey2]) => {
          ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(sx + ex1, sy + ey1); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(sx + ex2, sy + ey2); ctx.stroke();
        });
        ctx.globalAlpha = 1;

        // Label
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor  = social.color;
        ctx.shadowBlur   = 6 + glow * 10;

        ctx.fillStyle = '#fff';
        ctx.font      = `bold ${Math.round(h * 0.3)}px 'Courier New', monospace`;
        ctx.fillText(social.label, x + w / 2, y + h / 2 - h * 0.13);

        ctx.fillStyle = social.color;
        ctx.font      = `${Math.round(h * 0.2)}px 'Courier New', monospace`;
        ctx.fillText(social.handle, x + w / 2, y + h / 2 + h * 0.18);

        ctx.shadowBlur = 0;
        ctx.restore();
      });
    }

    function drawTrail() {
      trail.forEach((pt, i) => {
        const alpha = (1 - i / trail.length) * 0.35;
        const r     = BALL_R * (1 - i / trail.length) * 0.7;
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(0,255,200,${alpha})`;
        ctx.fill();
      });
    }

    function drawBall() {
      // Outer glow
      ctx.shadowColor = '#00ffc8';
      ctx.shadowBlur  = 24;

      // Gradient sphere
      const g = ctx.createRadialGradient(
        ball.x - BALL_R * 0.35, ball.y - BALL_R * 0.35, BALL_R * 0.1,
        ball.x, ball.y, BALL_R
      );
      g.addColorStop(0.0, '#ffffff');
      g.addColorStop(0.3, '#00ffc8');
      g.addColorStop(0.7, '#00aaff');
      g.addColorStop(1.0, '#0044aa00');

      ctx.beginPath();
      ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
      ctx.fillStyle = g;
      ctx.fill();
      ctx.shadowBlur = 0;

      // Specular highlight
      ctx.beginPath();
      ctx.arc(ball.x - BALL_R * 0.3, ball.y - BALL_R * 0.3, BALL_R * 0.22, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.fill();
    }

    function drawParticles() {
      particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur  = 6;
        ctx.fill();
        ctx.shadowBlur = 0;
      });
      ctx.globalAlpha = 1;
    }

    function drawHUD() {
      // Title
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor  = '#00ffc8';
      ctx.shadowBlur   = 14;
      ctx.fillStyle    = '#ffffff';
      ctx.font         = `bold ${Math.min(32, W * 0.085)}px 'Courier New', monospace`;
      ctx.fillText('ward_sentry', W / 2, H * 0.1);

      // Hint
      ctx.shadowBlur  = 0;
      ctx.fillStyle   = '#ffffff44';
      ctx.font        = `${Math.min(12, W * 0.032)}px 'Courier New', monospace`;
      const hint = hasGyro
        ? 'наклоняй телефон — закати мяч на ссылку'
        : 'двигай мышью или кликай на кнопку';
      ctx.fillText(hint, W / 2, H * 0.1 + Math.min(32, W * 0.085) * 0.9);

      ctx.shadowBlur = 0;
    }

    // ─── MAIN LOOP ────────────────────────────────────────────────────────────
    let lastTime = 0;
    function loop(ts) {
      const dt = Math.min(ts - lastTime, 50); // cap at 50ms
      lastTime = ts;

      // Fixed-step update (up to 2 steps per frame)
      const steps = Math.round(dt / 16.67) || 1;
      for (let i = 0; i < Math.min(steps, 2); i++) update();

      ctx.clearRect(0, 0, W, H);

      drawHUD();
      drawButtons();
      drawParticles();
      drawTrail();
      drawBall();

      requestAnimationFrame(loop);
    }

    // ─── INIT ─────────────────────────────────────────────────────────────────
    window.addEventListener('resize', () => { resize(); resetBall(); });
    resize();
    resetBall();
    setupGyro();
    requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
