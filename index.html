<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0c0c18">
  <title>ward_sentry</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* ════════════════════════════════
       BODY & BACKGROUND
    ════════════════════════════════ */
    body {
      background: #0a0a0f;
      width: 100dvw; height: 100dvh;
      font-family: 'Inter', system-ui, sans-serif;
      touch-action: none;
      user-select: none;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* moving cyberpunk grid */
    .grid {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,255,200,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,200,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
    }
    @keyframes gridMove {
      from { background-position: 0 0; }
      to   { background-position: 48px 48px; }
    }

    /* scanlines */
    .scanlines {
      position: fixed; inset: 0; z-index: 50;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
    }

    /* ════════════════════════════════
       TITLE & HINT
    ════════════════════════════════ */
    .title {
      position: relative; z-index: 10;
      margin-bottom: clamp(32px, 7vmin, 52px);
      text-align: center;
    }
    .title h1 {
      font-size: clamp(17px, 4.5vw, 28px);
      font-weight: 300;
      letter-spacing: 8px;
      text-transform: uppercase;
      color: #d8d8f0;
      text-shadow: 0 0 30px rgba(0,255,200,0.2);
    }
    .title h1 strong { font-weight: 600; color: #fff; }
    .title .sub {
      margin-top: 5px;
      font-size: clamp(8px, 1.8vw, 10px);
      letter-spacing: 4px;
      color: #2e2e54;
      text-transform: uppercase;
    }

    .hint {
      position: relative; z-index: 10;
      margin-top: clamp(32px, 7vmin, 52px);
      font-size: clamp(8px, 2vw, 10px);
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #252545;
    }

    /* ════════════════════════════════
       3-D SCENE
    ════════════════════════════════ */
    .scene {
      perspective: 950px;
      position: relative;
      z-index: 10;
    }

    /* soft ground shadow (no filter on cube!) */
    .cube-shadow {
      position: absolute;
      bottom: -26px; left: 50%;
      transform: translateX(-50%);
      width: 180px; height: 28px;
      background: radial-gradient(ellipse, rgba(0,0,0,0.6) 0%, transparent 70%);
      pointer-events: none;
    }

.cube {
      --s: min(215px, 52vmin);
      --h: calc(var(--s) / 2);
      width: var(--s); height: var(--s);
      position: relative;
      transform-style: preserve-3d;
      transform: rotateX(-28deg) rotateY(38deg);
      cursor: grab;
      will-change: transform;
    }
    .cube.dragging { cursor: grabbing; }

    /* ════════════════════════════════
       FACE — base
    ════════════════════════════════ */
    .face {
      position: absolute; inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(8px, 2vmin, 13px);
      text-decoration: none;
      border-radius: 0;
      /* no overflow:hidden — glow needs to escape the face plane */
      transform-style: preserve-3d;

      background: #0a0a0f;
      border: 1px solid rgba(255,255,255,0.55);
      box-shadow: none;

      transition: border-color 0.3s;
    }

    /* face positions */
    .face-front  { transform: translateZ(var(--h)); }
    .face-back   { transform: rotateY(180deg) translateZ(var(--h)); }
    .face-left   { transform: rotateY(-90deg) translateZ(var(--h)); }
    .face-right  { transform: rotateY( 90deg) translateZ(var(--h)); }
    .face-top    { transform: rotateX( 90deg) translateZ(var(--h)); }
    .face-bottom { transform: rotateX(-90deg) translateZ(var(--h)); }

    /* accent colour per face */
    .c-tg    { --c: #29a8eb; }
    .c-vk    { --c: #5b8bcc; }
    .c-ig    { --c: #d63376; }
    .c-yt    { --c: #e63030; }
    .c-proxy { --c: #00c9a0; }
    .c-ym    { --c: #ffdb4d; }

    .face::before { display: none; }
    .face::after  { display: none; }


    /* ════════════════════════════════
       3-D GLOW — floats in front of face
       translateZ pushes it toward viewer
    ════════════════════════════════ */
    .face-glow {
      position: absolute;
      /* larger than the face so light spills around edges */
      inset: -35%;
      border-radius: 50%;
      transform: translateZ(30px);
      background: radial-gradient(
        ellipse at center,
        color-mix(in srgb, var(--c) 55%, transparent) 0%,
        color-mix(in srgb, var(--c) 22%, transparent) 35%,
        transparent 68%
      );
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s;
    }

    /* ════════════════════════════════
       HOVER
    ════════════════════════════════ */
    a.face:hover {
      border-color: rgba(255,255,255,0.85);
    }

    a.face:hover .face-glow {
      opacity: 1;
      animation: glowPulse 1.8s ease-in-out infinite;
    }


    @keyframes glowPulse {
      0%, 100% { opacity: 0.75; transform: translateZ(30px) scale(1);   }
      50%       { opacity: 1;    transform: translateZ(30px) scale(1.08); }
    }

    /* pulsing glow (45° directional stays consistent) */
    @keyframes chestPulse {
      0%, 100% {
        box-shadow:
          inset 3px  3px 10px #04040a,
          inset -3px -3px 10px #1a1a2e,
          inset 0 0 28px color-mix(in srgb, var(--c) 20%, transparent),
          -14px -14px 35px color-mix(in srgb, var(--c) 50%, transparent),
          -24px -24px 65px color-mix(in srgb, var(--c) 28%, transparent),
          10px  10px 22px rgba(0,0,0,0.55),
          0 0 50px color-mix(in srgb, var(--c) 14%, transparent);
      }
      50% {
        box-shadow:
          inset 3px  3px 10px #04040a,
          inset -3px -3px 10px #1a1a2e,
          inset 0 0 40px color-mix(in srgb, var(--c) 32%, transparent),
          -20px -20px 50px color-mix(in srgb, var(--c) 68%, transparent),
          -35px -35px 90px color-mix(in srgb, var(--c) 38%, transparent),
          12px  12px 28px rgba(0,0,0,0.6),
          0 0 75px color-mix(in srgb, var(--c) 22%, transparent);
      }
    }

    /* ════════════════════════════════
       FACE CONTENT
    ════════════════════════════════ */
    .face-icon {
      width:  clamp(26px, 7vmin, 40px);
      height: clamp(26px, 7vmin, 40px);
      color: var(--c);
      position: relative; z-index: 1;
    }
    .face-name {
      font-size: clamp(9px, 2.5vmin, 13px);
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.88);
      position: relative; z-index: 1;
    }
    .face-sub {
      font-size: clamp(7px, 1.8vmin, 10px);
      letter-spacing: 1.5px;
      color: color-mix(in srgb, var(--c) 75%, #aaa);
      position: relative; z-index: 1;
    }

  </style>
</head>
<body>
  <div class="grid"></div>
  <div class="scanlines"></div>

  <div class="title">
    <h1><strong>ward</strong>_sentry</h1>
    <div class="sub">digital presence</div>
  </div>

  <div class="scene">
    <div class="cube-shadow"></div>
    <div class="cube" id="cube">

      <!-- FRONT — Telegram -->
      <a class="face face-front c-tg" href="https://t.me/ward_sentry" target="_blank" rel="noopener">
        <div class="face-glow"></div>
        <svg class="face-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M20.665 3.717l-17.73 6.837c-1.21.486-1.203 1.161-.222 1.462l4.552 1.42 10.532-6.645c.498-.303.953-.14.579.192l-8.533 7.701h-.002l.002.001-.314 4.692c.46 0 .663-.211.921-.46l2.211-2.15 4.599 3.397c.848.467 1.457.227 1.668-.785l3.019-14.228c.309-1.239-.473-1.8-1.282-1.434z"/>
        </svg>

      <!-- BACK — YouTube -->
      <a class="face face-back c-yt" href="https://youtube.com/@ward_sentry" target="_blank" rel="noopener">

          <rect x="2" y="5" width="20" height="14" rx="3" stroke="currentColor" stroke-width="1.6"/>
          <path d="M10 9.5l5.5 3-5.5 3V9.5z" fill="currentColor"/>

      <a class="face face-left c-vk" href="https://vk.com/ward_sentry" target="_blank" rel="noopener">
        <div class="face-glow"></div>
        <svg class="face-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M13.6 17.3h1.5s.5-.1.7-.3c.2-.2.2-.7.2-.7s0-2 1-2.3c.9-.3 2.1 1.9 3.3 2.8.3.2.7.4 1.2.4l2.3-.1s1.2-.1.6-1c0-.1-.3-.7-1.7-2-.7-.6-1.5-1.4-.5-2.7 1.1-1.5 1.6-2.3 1.4-2.7-.2-.4-.9-.3-.9-.3l-2.6.1s-.2 0-.3.1c-.1.1-.2.2-.2.2s-.4 1.1-.9 2c-1.2 1.9-1.6 2-1.8 1.9-.4-.3-.3-1.2-.3-1.9 0-2 .3-2.9-.6-3.1-.3-.1-.5-.1-1.3-.2-1.1 0-1.9.1-2.5.2-.3.2-.5.5-.4.5.2 0 .7.1.9.4.3.5.3 1.4.3 1.4s.2 2.4-.4 2.7c-.4.2-1-.3-2.2-2.1-.6-.9-1-1.9-1-1.9s-.1-.2-.2-.2c-.2-.1-.4-.1-.4-.1l-2.5.1s-.4 0-.5.2c-.1.2 0 .4 0 .4s1.9 4.5 4.1 6.8c2 2.1 4.2 1.9 4.2 1.9z"/>
        </svg>

          <circle cx="12" cy="12" r="4.5" stroke="currentColor" stroke-width="1.6"/>

      <!-- TOP — MTProxy -->

      <!-- BOTTOM — Яндекс Музыка -->

        <svg class="face-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 3a9 9 0 1 0 0 18A9 9 0 0 0 12 3zm0 2a7 7 0 1 1 0 14A7 7 0 0 1 12 5zm-1 3v8l6-4-6-4z"/>

        <div class="face-sub">плейлист</div>
      </a>

    </div>
  </div>

  <div class="hint">drag to rotate</div>

  <script>
  (() => {
    const cube = document.getElementById('cube');

    let rotX = -28, rotY = 38;
    let velX = 0, velY = 0;
    let dragging  = false;
    let hasDragged = false;
    let lastPX = 0, lastPY = 0;
    let lastDragEnd = 0;
    let raf = 0;

    const IDLE_AFTER  = 2500;
    const AUTO_SPEED  = 0.18;

    function applyTransform() {
      cube.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
    }

    function onDown(px, py) {
      dragging   = true;
      hasDragged = false;
      lastPX = px; lastPY = py;
      velX = velY = 0;
      cube.classList.add('dragging');
      cancelAnimationFrame(raf);
    }

    function onMove(px, py) {
      if (!dragging) return;
      const dx = px - lastPX;
      const dy = py - lastPY;
      if (Math.abs(dx) > 1 || Math.abs(dy) > 1) hasDragged = true;
      velY = dx * 0.42;
      velX = -dy * 0.42;
      rotY += velY;
      rotX = Math.max(-78, Math.min(78, rotX + velX));
      lastPX = px; lastPY = py;
      applyTransform();
    }

    function onUp() {
      if (!dragging) return;
      dragging = false;
      lastDragEnd = Date.now();
      cube.classList.remove('dragging');
      raf = requestAnimationFrame(animStep);
    }

    function animStep() {
      const idle = !dragging && (Date.now() - lastDragEnd > IDLE_AFTER);
      if (idle) {
        velX *= 0.94;
        velY = velY * 0.94 + AUTO_SPEED * 0.06;
      } else {
        velX *= 0.91;
        velY *= 0.91;
      }
      rotY += velY;
      rotX = Math.max(-78, Math.min(78, rotX + velX));
      applyTransform();
      raf = requestAnimationFrame(animStep);
    }

    // Mouse
    cube.addEventListener('mousedown',  e => { onDown(e.clientX, e.clientY); e.preventDefault(); });
    document.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
    document.addEventListener('mouseup',   () => onUp());

    // Touch
    cube.addEventListener('touchstart',  e => { onDown(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); }, { passive: false });
    document.addEventListener('touchmove', e => { onMove(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); }, { passive: false });
    document.addEventListener('touchend', () => onUp());

    // Prevent accidental link opens on drag
    cube.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', e => { if (hasDragged) e.preventDefault(); });
    });

    // Auto-rotate start
    lastDragEnd = Date.now() - IDLE_AFTER;
    raf = requestAnimationFrame(animStep);
  })();
  </script>
</body>
